# Dev overrides — hot-reload for backend and agent.
# Activated automatically by docker compose alongside docker-compose.yml.
# Usage: docker compose up   (override is merged automatically)

services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    environment:
      - PYTHONDONTWRITEBYTECODE=1

  agent:
    build:
      context: ./agent
    volumes:
      - ./agent:/app
    command: uvicorn agent:app --host 0.0.0.0 --port 8787 --reload
    environment:
      - PYTHONDONTWRITEBYTECODE=1

  frontend:
    build:
      context: ./frontend
      target: builder
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      # Fix file watching issues on Windows Docker
      - CHOKIDAR_USEPOLLING=true
      - BACKEND_URL=http://backend:8080
      - BACKEND_WS_URL=ws://backend:8080


  # Expose postgres on a non-conflicting host port for running pytest outside Docker.
  # Port 5432 may be taken by a local PostgreSQL install; we use 5433 on the host.
  # Bound to 127.0.0.1 only — not reachable from LAN.
  # Set TEST_DATABASE_URL=postgresql+asyncpg://bench:<pass>@localhost:5433/bench_test when running pytest.
  postgres:
    ports:
      - "127.0.0.1:5433:5432"
