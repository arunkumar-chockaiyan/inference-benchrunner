networks:
  bench-net:
    driver: bridge

services:

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=bench
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=bench
    # No host port binding — only backend needs this, via bench-net
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks: [bench-net]

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    # No host port binding — only backend/grafana need this, via bench-net
    volumes:
      - ch-data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    networks: [bench-net]

  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://bench:${POSTGRES_PASSWORD}@postgres:5432/bench
      - OTEL_COLLECTOR_ENDPOINT=http://otel-collector:4317
      - VICTORIAMETRICS_URL=http://victoriametrics:8428
      - AGENT_URL=http://agent:8787
      - AGENT_SECRET_KEY=${AGENT_SECRET_KEY}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - GRAFANA_URL=http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      agent:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    networks: [bench-net]

  agent:
    build: ./agent
    command: uvicorn agent:app --host 0.0.0.0 --port 8787
    ports: ["8787:8787"]
    environment:
      - AGENT_SECRET_KEY=${AGENT_SECRET_KEY}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8787/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    networks: [bench-net]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks: [bench-net]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    volumes:
      - ./infra/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      # Bound to localhost only — sidecar runs on the host and pushes metrics here.
      # Internal services (backend) reach it via bench-net, not these ports.
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks: [bench-net]

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    # No host port binding — grafana and otel-collector reach it via bench-net
    volumes:
      - vm-data:/storage
    command:
      - "--retentionPeriod=12"
      - "--storageDataPath=/storage"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks: [bench-net]

  grafana:
    image: grafana/grafana:11.4.0
    ports: ["3001:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      victoriametrics:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks: [bench-net]

volumes:
  pg-data:
  ch-data:
  vm-data:
  grafana-data:
